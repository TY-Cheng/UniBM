name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development environment
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: uv run coverage run -m unittest discover -s tests -p 'test_*.py'

      - name: Report coverage
        run: uv run coverage report -m

      - name: Normalize formatting
        run: uv run ruff format .

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development environment
        run: uv sync --dev

      - name: Build MkDocs site
        run: uv run mkdocs build --strict
